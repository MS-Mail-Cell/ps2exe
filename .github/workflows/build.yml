name: Build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1

      - name: Build Release
        run: |
          python ps2exe.py example.ps1 ps2exe-demo.exe

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ps2exe-demo
          path: ps2exe-demo.exe

  release:
    needs: build
    runs-on: windows-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download Artifact
        uses: actions/download-artifact@v4
        with:
          name: ps2exe-demo

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: ps2exe-demo.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
